city_parking_info:
    name: Get parking info
    description: Get local parking info
    fields:
        origin:
            name: Origin
            description: Origin eg 51.330436, 3.802043 or person.fred or zone.home or street, city, country
            required: True
            example: zone.home
            selector:
              text:
        api_mode:
            name: Seety API
            description: Use legacy for the existing implementation or official for Seety's external API
            required: False
            example: official
            selector:
              select:
                options:
                  - legacy
                  - official
        api_key:
            name: Official Seety API key
            description: Required when api_mode is official
            required: False
            selector:
              text:
                type: password

